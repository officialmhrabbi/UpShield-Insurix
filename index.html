<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UpShield Insurix - Simply compare, order, and get covered.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════ NAVBAR ═══════════════════════════════════════ -->
  <header class="navbar">
    <div class="container navbar__inner">
      <a href="#" class="navbar__brand">
        <span class="brand-icon">🛡</span>
        <span class="brand-name"><strong>UpShield</strong></span>
      </a>
      <nav class="navbar__links">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Get Quote</a>
        <a href="#">Claims</a>
        <a href="#" class="btn btn--support">Support</a>
      </nav>
      <div class="navbar__actions">
        <a href="#" class="btn btn--ghost">Login</a>
        <a href="#" class="btn btn--primary">Get a Quote</a>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════ HERO ═══════════════════════════════════════ -->
  <section class="hero">
    <div class="container hero__inner">
      <div class="hero__content">
        <h1 class="hero__heading">
          Simply compare,<br />
          order, and <span class="text-primary">get covered.</span>
        </h1>
        <p class="hero__sub">Reliable digital insurance solutions for you.</p>

        <div class="hero__icons">
          <div class="hero-icon"><span class="icon">🏠</span><span>Home<br/>Insurance</span></div>
          <div class="hero-icon"><span class="icon">🚗</span><span>Accident<br/>Insurance</span></div>
          <div class="hero-icon"><span class="icon">⚓</span><span>Travel<br/>Insurance</span></div>
          <div class="hero-icon"><span class="icon">🏥</span><span>Car<br/>Insurance</span></div>
          <div class="hero-icon"><span class="icon">❤️</span><span>Life<br/>Insurance</span></div>
          <div class="hero-icon"><span class="icon">🏦</span><span>Health<br/>Insurance</span></div>
        </div>

        <div class="hero__cta">
          <input type="text" class="hero__input" placeholder="Request for a phone call" />
          <button class="btn btn--primary">Send</button>
        </div>
      </div>
      <div class="hero__image">
        <img src="assets/hero-family.png" alt="Happy family" />
      </div>
    </div>
  </section>


</body>
</html>
